<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Popup (Social Login Sim)</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 24px; }
    label, input, button { display:block; margin: 8px 0; }
    .btn { padding: 8px 12px; }
    .notice { margin-top: 12px; color:#666 }
  </style>
</head>
<body>
  <h2>소셜 로그인 시뮬레이션</h2>
  <p>아래 폼을 작성하고 "로그인"을 누르면 opener로 메시지를 보냅니다.</p>

  <label>이메일
    <input id="email" type="email" placeholder="user@example.com" value="test@example.com" />
  </label>
  <label>이름
    <input id="name" type="text" placeholder="홍길동" value="테스트 사용자" />
  </label>
  <button id="loginBtn" class="btn">로그인</button>

  <div class="notice">팝업에서 opener에 직접 접근 불가한 경우, localStorage에 저장해 두고 opener가 조회하도록 합니다.</div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.addEventListener('click', () => {
      const payload = {
        provider: 'test-social',
        email: document.getElementById('email').value,
        name: document.getElementById('name').value,
        timestamp: Date.now()
      };

      const serialized = JSON.stringify(payload);

      // 1) 우선 opener로 postMessage 시도
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(serialized, '*');
          // 성공하면 창 닫기
          setTimeout(() => window.close(), 200);
          return;
        }
      } catch (e) {
        // cross-origin 또는 접근 불가
      }

      // 2) 접근 불가하면 localStorage에 저장
      try {
        localStorage.setItem('popup_last_message', serialized);
        // 팝업이 열린 도메인이 다를 경우에도 opener가 같은 도메인에서 localStorage를 읽을 수는 없다.
      } catch (e) {}

      // 3) 폴링으로 opener가 나타나면 메시지 전송 시도
      const poll = setInterval(() => {
        try {
          if (window.opener && !window.opener.closed) {
            try { window.opener.postMessage(serialized, '*'); } catch (e) {}
            clearInterval(poll);
            window.close();
          }
        } catch (e) {}
      }, 500);

      // 4) 10초 후까지 못하면 그냥 닫기
      setTimeout(() => { clearInterval(poll); window.close(); }, 10000);
    });

    // 도움을 위해, opener가 메시지를 못받았을 경우를 대비해 버튼 아래에 raw 메시지 표시
    const el = document.createElement('pre');
    el.textContent = '준비됨';
    document.body.appendChild(el);
    window.addEventListener('DOMContentLoaded', () => {
      el.textContent = 'ready';
    });
  </script>
</body>
</html>
